version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing Terraform"
      - curl -fsSL -o terraform.zip https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
      - unzip terraform.zip
      - mv terraform /usr/local/bin/
      - terraform version

  pre_build:
    commands:
      - echo "Preparing Terraform deployment"
      - cd terraform
      - terraform init

  build:
    commands:
      - echo "Running Terraform plan"
      - terraform plan -input=false -out=tfplan

  post_build:
    commands:
      - echo "Applying Terraform"
      - terraform apply -input=false -auto-approve tfplan